spring.application.name=onboarding

# ── H2 File-Based Database (data persists across restarts) ──────────────────
spring.datasource.url=jdbc:h2:file:./data/onboardingdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# ── H2 Web Console ───────────────────────────────────────────────────────────
# URL: http://localhost:8080/h2-console
# JDBC URL to enter in console: jdbc:h2:file:./data/onboardingdb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
